---
# Registry (override with -e or REGISTRY_USERNAME / REGISTRY_PASSWORD env vars)
aap_matrix_registry: registry.redhat.io
aap_matrix_registry_username: "{{ lookup('env', 'REGISTRY_USERNAME') }}"
aap_matrix_registry_password: "{{ lookup('env', 'REGISTRY_PASSWORD') }}"

# Repo paths (role lives under ansible/roles/<role>/)
aap_matrix_repo_root: "{{ playbook_dir }}/.."
aap_matrix_data_dir: "{{ aap_matrix_repo_root }}/data"
aap_matrix_overlaps_json: "{{ aap_matrix_repo_root }}/scripts/csv-overlaps.json"
# Cached operator index extracts (one dir per OCP); reused across AAP versions in aap_csv_update loop
aap_matrix_index_cache_dir: "{{ aap_matrix_repo_root }}/.cache/operator-index"

# Operator index scrape (all OCP tags to scan for OpenShift Support ranges)
aap_matrix_operator_package: ansible-automation-platform-operator
aap_matrix_operator_index_ocp_versions:
  - "4.11"
  - "4.12"
  - "4.13"
  - "4.14"
  - "4.15"
  - "4.16"
  - "4.17"
  - "4.18"
  - "4.19"
  - "4.20"
  - "4.21"

# AAP CSV version update: column indices and OCP/channel loops
aap_matrix_columns:
  release_date: 1
  cluster_scoped: 2
  namespace_scoped: 3
  openshift_support: 4

aap_matrix_loops:
  - ocp_version: "4.18"
    channel: stable-2.4
    aap_version: "2.4"
    scope: namespace
  - ocp_version: "4.18"
    channel: stable-2.4-cluster-scoped
    aap_version: "2.4"
    scope: cluster
  - ocp_version: "4.18"
    channel: stable-2.5
    aap_version: "2.5"
    scope: namespace
  - ocp_version: "4.18"
    channel: stable-2.5-cluster-scoped
    aap_version: "2.5"
    scope: cluster
  - ocp_version: "4.18"
    channel: stable-2.6
    aap_version: "2.6"
    scope: namespace
  - ocp_version: "4.18"
    channel: stable-2.6-cluster-scoped
    aap_version: "2.6"
    scope: cluster
  - ocp_version: "4.18"
    channel: stable-2.7
    aap_version: "2.7"
    scope: namespace
  - ocp_version: "4.18"
    channel: stable-2.7-cluster-scoped
    aap_version: "2.7"
    scope: cluster
