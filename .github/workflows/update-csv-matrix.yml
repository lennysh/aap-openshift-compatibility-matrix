# Update AAP operator CSV compatibility matrix from Red Hat operator index,
# then push any CSV/markdown changes back to the repo.
# Runs every 6 hours or when manually triggered.
#
# Required repo secrets: REGISTRY_USERNAME, REGISTRY_PASSWORD (Red Hat registry credentials)

name: Update AAP CSV matrix

on:
  workflow_dispatch:
  schedule:
    # Every 6 hours, with one run at 23:30 UTC (right before midnight)
    - cron: '30 23,5,11,17 * * *'

permissions:
  contents: write

jobs:
  update-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Install Ansible
        run: python3 -m pip install ansible

      # Use Red Hat action so login works with rootless podman on runners; avoids password in playbook logs
      - name: Log in to Red Hat container registry
        uses: redhat-actions/podman-login@v1
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Run Ansible playbook
        run: cd ansible && ansible-playbook playbook.yml -i inventory.yml

      - name: Commit and push CSV changes
        id: csv-push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"

          git add data/*.csv
          if ! git diff --staged --quiet; then
            git commit -m "chore: update AAP CSV matrix (operator CSVs and OpenShift Support)"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No CSV changes. Nothing to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Make csv2md script executable
        if: steps.csv-push.outputs.pushed == 'true'
        run: chmod +x scripts/csv2md.sh

      - name: Generate Markdown tables from CSV
        if: steps.csv-push.outputs.pushed == 'true'
        run: |
          ./scripts/csv2md.sh \
            -t "Red Hat Ansible Automation Platform 2.4 - OpenShift Operator Component versions" \
            ./data/AAP_24.csv > AAP_24.md
          ./scripts/csv2md.sh \
            -t "Red Hat Ansible Automation Platform 2.5 - OpenShift Operator Component versions" \
            ./data/AAP_25.csv > AAP_25.md
          ./scripts/csv2md.sh \
            -t "Red Hat Ansible Automation Platform 2.6 - OpenShift Operator Component versions" \
            ./data/AAP_26.csv > AAP_26.md

      - name: Commit and push Markdown changes
        if: steps.csv-push.outputs.pushed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add AAP_24.md AAP_25.md AAP_26.md
          if ! git diff --staged --quiet; then
            git commit -m "docs: auto-generate markdown tables from CSV update"
            git push
          else
            echo "No markdown changes to commit."
          fi
